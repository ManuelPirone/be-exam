spring:
  application:
    name: be-exam

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:library_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:v9B2x8F1A6zK3mP5qR9sT2uW4xY7zA1bC3dE5fG7hI9jK1lM3nP5}
  expiration: 86400000